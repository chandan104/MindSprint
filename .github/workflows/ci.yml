name: CI

on:
  push:
    branches: [main, master, phase-1-foundation]
  pull_request:

jobs:
  contracts:
    name: Contract fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: tools
      - run: node validate-contracts.mjs
        working-directory: tools

  database:
    name: Migrations + pgTAP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start
      - run: supabase test db
      - run: supabase stop

  admin:
    name: Admin (lint, types, tests, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  student:
    name: Student app (analyze + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/student
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze
      - run: flutter test
